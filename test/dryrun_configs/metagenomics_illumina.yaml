# Config for Illumina Metagenomics Dry-run
samples:
  META1: data/reads/META1_R1.fastq.gz data/reads/META1_R2.fastq.gz

data: illumina
output: test/dryrun_output/metagenomics_illumina/
threads: 2

# Databases and paths
kraken2_database: databases/kraken2/
krona_database: databases/krona/taxonomy/
taxdump: databases/taxdump/
diamond_database: databases/diamond/nr.dmnd

# Execution flags
remove_human_reads: false
remove_unclassified_reads: false
host_reference: NA
deacon_index: NA

run_denovo_assembly: true
run_kraken2_reads: true
run_kraken2_contigs: true
run_diamond_reads: false
run_diamond_contigs: false

# Advanced parameters
taxids: NA
diamond_sensitivity: sensitive
evalue: 0.001
bleed_fraction: 0.005
negative_controls: []
negative_p_threshold: 0.01
minimum_hit_group: 4

# QC parameters
adapters: NA 
minimum_length: 50
trim_head: 0
trim_tail: 0
cut_front_mean_quality: 20
cut_tail_mean_quality: 20
cut_right_window_size: 4
cut_right_mean_quality: 20

# Alignment parameters
af_threshold: 0.5
af_isnv_threshold: 0.05
run_isnv: false
