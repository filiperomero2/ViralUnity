# Config for Nanopore Metagenomics Dry-run
samples:
  META_NP: data/reads/META_NP.fastq.gz

data: nanopore
output: test/dryrun_output/metagenomics_nanopore/
threads: 2

# Databases and paths
kraken2_database: databases/kraken2/
krona_database: databases/krona/taxonomy/
taxdump: databases/taxdump/
diamond_database: databases/diamond/nr.dmnd

# Execution flags
remove_human_reads: false
remove_unclassified_reads: false
host_reference: NA
deacon_index: NA

run_denovo_assembly: true
run_polish_racon: false
run_polish_medaka: false
run_kraken2_reads: true
run_kraken2_contigs: true
run_diamond_reads: false
run_diamond_contigs: false

# Advanced parameters
taxids: NA
diamond_sensitivity: sensitive
evalue: 0.001
bleed_fraction: 0.005
negative_controls: []
negative_p_threshold: 0.01
minimum_hit_group: 4
